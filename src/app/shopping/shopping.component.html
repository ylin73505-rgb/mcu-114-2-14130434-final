<header>
  <app-hard></app-hard>
</header>

<main class="checkout-grid">
  <section class="customer">
    <h2>基本資料</h2>
    <div class="field">
      <label>姓名</label>
      <input type="text" />
      <span class="hint">請輸入姓名</span>
    </div>
    <div class="field">
      <label>地址</label>
      <input type="text" />
      <span class="hint">請輸入地址</span>
    </div>
    <div class="field">
      <label>電話</label>
      <input type="text" />
      <span class="hint">請輸入電話</span>
    </div>
  </section>

  <section class="cart">
    <h2>購買項目</h2>
    @if (cartItems().length > 0) {
    <div class="cart-list" role="list" aria-label="購買項目清單">
      @for (item of cartItems(); track item.title; let index = $index) {
      <article class="cart-row" role="listitem">
        <div class="row-index">{{ index + 1 }}</div>

        <div class="row-title">
          <div class="item-name">{{ item.title }}</div>
        </div>

        <label class="qty-field" aria-label="數量">
          <input
            #qtyInput
            type="number"
            min="0"
            class="qty-input"
            [value]="item.quantity"
            (change)="updateQuantity(item.title, qtyInput.valueAsNumber)"
          />
        </label>

        <div class="item-price">${{ item.price | number:'1.2-2' }}</div>

        <button type="button" class="remove-btn" (click)="removeItem(item.title)">刪除</button>
      </article>
      }
    </div>
    <div class="cart-summary">
      <button type="button" class="submit-btn" [disabled]="cartItems().length === 0" (click)="submitOrder()">
        送出訂單 (${{ total() | number:'1.2-2' }})
      </button>
    </div>
    } @else {
    <p class="empty">購物車目前沒有商品</p>
    }
  </section>
</main>
