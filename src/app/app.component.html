<header>
  <app-hard></app-hard>
</header>

<div class="main">
  <div class="top-search">
    <div class="search-box">
      <input type="text" class="global-search" placeholder="產品名稱查詢" aria-label="全域搜尋產品" />
      <button class="search-btn" aria-label="查詢">查詢</button>
    </div>
  </div>

  <div class="products-container">
    @for (product of products; track product.title) {
    <app-product-card
      [title]="product.title"
      [authors]="product.authors"
      [publisher]="product.publisher"
      [price]="product.price"
    ></app-product-card>
    }
  </div>
</div>
