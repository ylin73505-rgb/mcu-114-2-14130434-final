<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/404\.html$/, '');
        var repoBase = path.substring(0, path.lastIndexOf('/'));
        var route = path.substring(repoBase.length);
        window.location.replace(repoBase + '/#' + route + window.location.search + window.location.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
